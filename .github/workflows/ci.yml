name: CI

on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:
    branches: ['**']

jobs:
  build:
    name: Test & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

      - name: Build
        run: npm run build

      - name: Read package version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Package extension
        run: |
          mkdir -p releases
          cd dist
          zip -r "../releases/tabtastic-${{ steps.pkg.outputs.version }}.zip" . -x "*.DS_Store"
          cd ..
          ls -la releases/

      - name: Upload extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: tabtastic-${{ steps.pkg.outputs.version }}
          path: releases/tabtastic-${{ steps.pkg.outputs.version }}.zip
          if-no-files-found: error
          retention-days: 30

  release:
    name: Publish GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Read package version
        id: pkg
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: Package extension
        run: |
          mkdir -p releases
          cd dist
          zip -r "../releases/tabtastic-${{ steps.pkg.outputs.version }}.zip" . -x "*.DS_Store"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: releases/tabtastic-${{ steps.pkg.outputs.version }}.zip
          generate_release_notes: true
