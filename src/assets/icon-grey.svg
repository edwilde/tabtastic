<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="128" height="128" role="img" aria-label="Tabtastic! — unbound window (grey)">
  <title>Tabtastic! (no project)</title>

  <!-- Layer 1: outer circle — slate disc with a white rim -->
  <circle cx="50" cy="50" r="49" fill="#64748B"/>
  <circle cx="50" cy="50" r="46" fill="none" stroke="#FFFFFF" stroke-width="2"/>

  <!-- Layer 2: cog (white) -->
  <g fill="#FFFFFF">
    <circle cx="50" cy="50" r="27"/>
    <rect x="48.4" y="14" width="3.2" height="13" rx="0.6"/>
    <rect x="48.4" y="14" width="3.2" height="13" rx="0.6" transform="rotate(30  50 50)"/>
    <rect x="48.4" y="14" width="3.2" height="13" rx="0.6" transform="rotate(60  50 50)"/>
    <rect x="48.4" y="14" width="3.2" height="13" rx="0.6" transform="rotate(90  50 50)"/>
    <rect x="48.4" y="14" width="3.2" height="13" rx="0.6" transform="rotate(120 50 50)"/>
    <rect x="48.4" y="14" width="3.2" height="13" rx="0.6" transform="rotate(150 50 50)"/>
    <rect x="48.4" y="14" width="3.2" height="13" rx="0.6" transform="rotate(180 50 50)"/>
    <rect x="48.4" y="14" width="3.2" height="13" rx="0.6" transform="rotate(210 50 50)"/>
    <rect x="48.4" y="14" width="3.2" height="13" rx="0.6" transform="rotate(240 50 50)"/>
    <rect x="48.4" y="14" width="3.2" height="13" rx="0.6" transform="rotate(270 50 50)"/>
    <rect x="48.4" y="14" width="3.2" height="13" rx="0.6" transform="rotate(300 50 50)"/>
    <rect x="48.4" y="14" width="3.2" height="13" rx="0.6" transform="rotate(330 50 50)"/>
  </g>

  <!-- Layer 3: clock face -->
  <circle cx="50" cy="50" r="20" fill="#64748B"/>
  <line x1="50" y1="50" x2="38" y2="44" stroke="#FFFFFF" stroke-width="2.6" stroke-linecap="round"/>
  <line x1="50" y1="50" x2="50" y2="34" stroke="#FFFFFF" stroke-width="2.6" stroke-linecap="round"/>
  <circle cx="50" cy="50" r="2.2" fill="#FFFFFF"/>
</svg>
