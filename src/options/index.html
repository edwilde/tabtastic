<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <link rel="stylesheet" href="./styles.css" />
    <title>Tabtastic! — Projects</title>
  </head>
  <body>
    <header>
      <h1>Tabtastic!</h1>
      <div class="tagline">Window Time Machine</div>
      <div class="actions">
        <button id="export">Export all</button>
        <input type="file" id="importFile" accept="application/json" hidden />
        <button id="importBtn">Import…</button>
      </div>
    </header>
    <main id="list"></main>
    <dialog id="strategy-dialog">
      <form method="dialog">
        <h2>Import — handle conflicts how?</h2>
        <p>Some incoming projects share an ID with existing ones.</p>
        <fieldset>
          <label><input type="radio" name="strategy" value="overwrite" checked /> Overwrite — replace existing project</label>
          <label><input type="radio" name="strategy" value="skip" /> Skip — keep existing, ignore incoming</label>
          <label><input type="radio" name="strategy" value="rename" /> Rename — keep both, add " (imported)" to incoming</label>
        </fieldset>
        <menu>
          <button value="cancel">Cancel</button>
          <button id="confirmStrategy" value="ok">Import</button>
        </menu>
      </form>
    </dialog>
    <script type="module" src="./index.ts"></script>
  </body>
</html>
